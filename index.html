<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Үг бичих тест</title>

<style>

body{
font-family:Arial;
background:#1e293b;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:#0f172a;
padding:40px;
border-radius:20px;
width:600px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.word{
font-size:42px;
margin:30px;
color:#fbbf24;
font-weight:bold;
}

input{
font-size:24px;
padding:12px;
width:80%;
border-radius:10px;
border:none;
text-align:center;
outline:none;
}

button{
margin-top:20px;
padding:10px 25px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#fbbf24;
font-weight:bold;
}

button:hover{
background:#f59e0b;
}

.correct{
color:#22c55e;
font-size:20px;
}

.wrong{
color:#ef4444;
font-size:20px;
}

.stats{
margin-top:20px;
font-size:18px;
}

.progress{
height:20px;
background:#334155;
border-radius:10px;
overflow:hidden;
margin-top:10px;
}

.bar{
height:100%;
background:#fbbf24;
width:0%;
transition:0.3s;
}

.score{
margin-top:10px;
font-size:18px;
color:#38bdf8;
}

</style>
</head>

<body>

<div class="container">

<h1>🇬🇧 → 🇲🇳 Үг бичих тест</h1>

<button onclick="startTest()">▶ Эхлэх</button>

<div class="word" id="englishWord">Эхлэх товч дарна уу</div>

<input id="answerInput" placeholder="Монгол орчуулга бичнэ" disabled>

<br>

<button onclick="checkAnswer()">Шалгах</button>

<div id="result"></div>

<div class="stats">

Зөв: <span id="correct">0</span> |
Буруу: <span id="wrong">0</span> |
Нийт: <span id="total">0</span>

<div class="score">
Оноо: <span id="score">0%</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

</div>

<button onclick="retryWrong()">❌ Алдсан үгс давтах</button>

</div>

<script>

let pairs=[]
let current=0
let correct=0
let wrong=0
let wrongPairs=[]

const wordEl = document.getElementById("englishWord")
const input = document.getElementById("answerInput")
const result = document.getElementById("result")

function normalize(text){
    return text.toLowerCase().trim().replace(/\s+/g," ")
}

function startTest(){
    loadCSV()
    input.disabled=false
}

function parseCSV(text){

    text = text.replace(/^\uFEFF/, "")

    const lines = text.split(/\r?\n/)
    const arr=[]

    for(let line of lines){

        line=line.trim()
        if(line==="") continue

        const p=line.split(",")

        if(p.length>=2){
            arr.push({
                english:p[0].trim(),
                mongol:p[1].trim()
            })
        }
    }

    return arr
}

async function loadCSV(){

    try{

        const r=await fetch("word1.csv")
        const text=await r.text()

        pairs=parseCSV(text)

        if(pairs.length===0){
            wordEl.innerText="CSV файл хоосон байна"
            return
        }

        shuffle()

        current=0
        correct=0
        wrong=0
        wrongPairs=[]

        document.getElementById("total").innerText=pairs.length

        updateStats()

        showWord()

    }catch(e){

        wordEl.innerText="CSV файл олдсонгүй"
        input.disabled=true

    }

}

function shuffle(){

    for(let i=pairs.length-1;i>0;i--){

        const j=Math.floor(Math.random()*(i+1))
        ;[pairs[i],pairs[j]]=[pairs[j],pairs[i]]

    }

}

function showWord(){

    if(current>=pairs.length){

        wordEl.innerText="🎉 Тест дууслаа"

        input.disabled=true

        const percent=Math.round((correct/pairs.length)*100)

        result.innerHTML="<div class='score'>Таны оноо: "+percent+"%</div>"

        return

    }

    wordEl.innerText=pairs[current].english

    input.value=""
    input.focus()

}

function checkAnswer(){

    if(current>=pairs.length) return

    const answer=normalize(input.value)
    const correctWord=normalize(pairs[current].mongol)

    if(answer===correctWord){

        correct++

        result.innerHTML="<div class='correct'>✔ Зөв</div>"

    }else{

        wrong++

        wrongPairs.push(pairs[current])

        result.innerHTML="<div class='wrong'>❌ Буруу → "+pairs[current].mongol+"</div>"

    }

    current++

    updateStats()

    setTimeout(showWord,1000)

}

function updateStats(){

    document.getElementById("correct").innerText=correct
    document.getElementById("wrong").innerText=wrong

    const answered=correct+wrong
    const total=pairs.length

    const percent=Math.round((answered/total)*100)

    document.getElementById("bar").style.width=percent+"%"

    const score=Math.round((correct/answered)*100)||0

    document.getElementById("score").innerText=score+"%"

}

function retryWrong(){

    if(wrongPairs.length===0) return

    pairs=[...wrongPairs]

    wrongPairs=[]

    current=0
    correct=0
    wrong=0

    shuffle()

    document.getElementById("total").innerText=pairs.length

    updateStats()

    showWord()

}

input.addEventListener("keypress",function(e){

    if(e.key==="Enter") checkAnswer()

})

</script>

</body>
</html>
