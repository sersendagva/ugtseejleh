<style>
  /* Товчлуур дээр дарахад мэдэгдэхүйц болгох */
  button:active { transform: scale(0.95); }
  
  /* Зөв хариултын анимейшн */
  @keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-5px); }
    50% { transform: translateX(5px); }
    100% { transform: translateX(0); }
  }
  .wrong-animation { animation: shake 0.2s ease-in-out 2; }
</style>

<script>
// ... өмнөх хувьсагчид ...

function parseCSV(text) {
    return text.split("\n")
        .filter(line => line.trim() !== "") // Хоосон мөрийг алгасах
        .map(line => {
            const parts = line.split(",");
            return {
                english: parts[0].trim(),
                mongol: parts.slice(1).join(",").trim() // Хэрэв монгол тайлбар дотор таслал байвал
            };
        });
}

function checkAnswer() {
    const answer = input.value.trim().toLowerCase();
    const correctWord = pairs[current].mongol.toLowerCase();
    const originalCorrect = pairs[current].mongol; // Дэлгэцэнд харуулах эх хувь

    if (answer === correctWord) {
        correct++;
        result.innerHTML = `<div class='correct'>✔ Зөв: ${originalCorrect}</div>`;
        result.classList.remove("wrong-animation");
    } else {
        wrong++;
        wrongPairs.push(pairs[current]);
        result.innerHTML = `<div class='wrong'>❌ Буруу → ${originalCorrect}</div>`;
        input.classList.add("wrong-animation");
        setTimeout(() => input.classList.remove("wrong-animation"), 300);
    }

    current++;
    updateStats();
    
    // Хэрэв дууссан бол оролтын хэсгийг нуух
    if (current < pairs.length) {
        showWord();
    } else {
        wordEl.innerText = "Баяр хүргэе! Дууслаа. 🎉";
        input.style.display = "none";
    }
}

// Enter дарахад шалгахаас гадна, дараагийн үг рүү шилжихэд бэлдэх
input.addEventListener("keyup", (e) => {
    if (result.innerHTML !== "" && e.key !== "Enter") {
        result.innerHTML = ""; // Шинэ үг бичиж эхлэхэд хуучин үр дүнг арилгах
    }
});
</script>
